name: Deploy to GitHub Pages

# O environment github-pages foi criado permitindo deploy apenas da branch
# default (a claude/...). Até a default virar main (Settings → General) ou o
# environment liberar main (Settings → Environments → github-pages), o gatilho
# na branch de trabalho é o que mantém o site publicando.
on:
  push:
    branches: [main, "claude/japanese-learning-app-design-8h0ty1"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# cancel-in-progress desligado: com gatilho em duas branches, a run da main
# (bloqueada pelo environment) cancelava a run boa da branch default.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
