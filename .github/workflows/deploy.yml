name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# contents:write para publicar a saída na branch gh-pages.
# Sem o environment github-pages / actions/deploy-pages: o site é publicado
# por push direto na branch gh-pages, então não há regra de environment que
# possa bloquear o deploy. gh-pages é gerada pela máquina — não se mexe nela.
permissions:
  contents: write

# cancel-in-progress desligado: com gatilho em duas branches, a run da main
# (bloqueada pelo environment) cancelava a run boa da branch default.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish to gh-pages
        run: |
          touch dist/.nojekyll
          cd dist
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
